<!DOCTYPE html>
<html lang="en">
<head>
  <script>window.DEMO_GUARD = { demoId: 'avisonar' };</script>
  <script src="../assets/js/guard.js"></script>

  <meta charset="UTF-8">
  <script>const _t=localStorage.getItem("bd-theme");if(_t)document.documentElement.setAttribute("data-theme",_t);</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AviSonar — Species</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    main { display: block; max-width: 1000px; margin: 0 auto; padding: 1.5rem 2rem; }

    .back-link {
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted);
      text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em;
      display: inline-flex; align-items: center; gap: 0.4rem; margin-bottom: 1.5rem;
    }
    .back-link:hover { color: var(--green); }

    /* Hero */
    .species-hero { display: flex; gap: 2rem; align-items: flex-start; margin-bottom: 2rem; }
    .species-hero-img { width: 180px; height: 180px; object-fit: cover; border-radius: 12px; background: var(--surface-2); flex-shrink: 0; }
    .species-hero-placeholder { width: 180px; height: 180px; background: var(--green-dim); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 4rem; flex-shrink: 0; }
    .species-hero-info { flex: 1; }
    .species-hero-common { font-family: var(--font-display); font-size: 2.2rem; color: var(--text); line-height: 1.1; margin-bottom: 0.3rem; }
    .species-hero-sci { font-size: 1rem; color: var(--text-muted); font-style: italic; margin-bottom: 1.25rem; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
    .stat-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.8rem; }
    .stat-box-value { font-family: var(--font-display); font-size: 1.3rem; color: var(--green); line-height: 1; }
    .stat-box-label { font-family: var(--font-mono); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-top: 0.15rem; }

    /* Chart rows */
    .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .chart-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; }
    .chart-title { font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 0.75rem; }

    /* SVG */
    .chart-svg { width: 100%; overflow: visible; }
    .chart-svg text { font-family: 'JetBrains Mono', monospace; fill: var(--text-muted); }

    /* Hourly bars */
    .hourly-bars { display: flex; align-items: flex-end; gap: 3px; height: 120px; }
    .hourly-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .hourly-bar { width: 100%; background: var(--green-dim); border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; }
    .hourly-bar:hover { background: var(--green); }
    .sun-night { border-bottom: 2px solid #21262d; }
    .sun-twilight { border-bottom: 2px solid rgba(210, 153, 34, 0.4); }
    .sun-day { border-bottom: 2px solid rgba(63, 185, 80, 0.2); }
    .sun-night .hourly-bar-label { color: #4a5060; }
    .sun-twilight .hourly-bar-label { color: var(--amber); }
    .sun-day .hourly-bar-label { color: var(--green); opacity: 0.5; }
    .hourly-bar-label { font-family: var(--font-mono); font-size: 0.5rem; color: var(--text-muted); }

    /* Monthly bars */
    .monthly-bars { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
    .monthly-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .monthly-bar { width: 100%; background: var(--green); border-radius: 3px 3px 0 0; min-height: 2px; }
    .monthly-bar:hover { opacity: 0.8; }
    .monthly-bar-label { font-family: var(--font-mono); font-size: 0.55rem; color: var(--text-muted); }
    .monthly-bar-count { font-family: var(--font-mono); font-size: 0.5rem; color: var(--text-muted); }

    /* Actions */
    .actions-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .action-btn {
      font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0.4rem 1rem; border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface-2); color: var(--text-muted); cursor: pointer; transition: all 0.15s; text-decoration: none;
    }
    .action-btn:hover { border-color: var(--green); color: var(--green); }

    /* Section title */
    .section-title { font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
    .sort-select { font-family: var(--font-mono); font-size: 0.6rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 0.2rem 0.5rem; }

    /* Compact encounters */
    .encounter-compact {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
      margin-bottom: 0.4rem; font-family: var(--font-mono); font-size: 0.78rem;
      cursor: pointer; transition: border-color 0.15s;
    }
    .encounter-compact:hover { border-color: var(--green); }
    .enc-date { color: var(--text-muted); min-width: 5rem; font-size: 0.7rem; }
    .enc-time { color: var(--text-muted); min-width: 7rem; }
    .enc-calls { color: var(--green); font-size: 0.7rem; min-width: 3.5rem; }
    .enc-conf { font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 3px; }
    .enc-conf-high { background: var(--green-dim); color: var(--green); }
    .enc-conf-mid { background: rgba(210, 153, 34, 0.15); color: var(--amber); }
    .enc-status { font-size: 0.6rem; color: var(--green); margin-left: auto; }
    .enc-expand { color: var(--text-muted); font-size: 0.7rem; margin-left: 0.5rem; transition: transform 0.2s; }
    .enc-expand.open { transform: rotate(90deg); }

    /* Expanded encounter */
    .encounter-detail { display: none; padding: 0.75rem; margin-bottom: 0.4rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }
    .encounter-detail.open { display: block; }

    .call-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.4rem 0.6rem; background: var(--surface-2); border-radius: 4px; margin-bottom: 0.3rem; font-family: var(--font-mono); font-size: 0.75rem; }
    .call-row.rejected { opacity: 0.35; text-decoration: line-through; }
    .call-row.verified { border-left: 3px solid var(--green); }
    .call-time { color: var(--text-muted); min-width: 5rem; }
    .call-conf { color: var(--text-muted); font-size: 0.65rem; min-width: 2.5rem; }
    .call-audio { flex: 1; } .call-audio audio { width: 100%; height: 26px; }
    .call-no-audio { flex: 1; font-size: 0.6rem; color: var(--text-muted); font-style: italic; }
    .call-badge { font-size: 0.55rem; padding: 0.1rem 0.3rem; border-radius: 3px; text-transform: uppercase; }
    .badge-verified { background: var(--green-dim); color: var(--green); }
    .badge-rejected { background: rgba(248, 81, 73, 0.1); color: var(--red); }
    .yam-chip {
      display: inline-flex; align-items: center; gap: 0.25rem;
      font-size: 0.55rem; padding: 0.1rem 0.35rem; border-radius: 3px;
      border: 1px solid var(--border); background: var(--surface);
      font-family: var(--font-mono); white-space: nowrap; max-width: 14rem;
      overflow: hidden; text-overflow: ellipsis;
    }
    .yam-chip-bird  { border-color: var(--green); color: var(--green); }
    .yam-chip-noise { border-color: var(--red); color: var(--red); }
    .yam-chip-other { color: var(--text-muted); }
    .call-correction {
      font-size: 0.6rem; color: var(--amber); font-style: italic;
      padding: 0.1rem 0.35rem; border: 1px dashed var(--amber); border-radius: 3px;
    }
    .call-actions { display: flex; gap: 0.25rem; }
    .call-btn { width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: all 0.15s; }
    .call-btn:hover { border-color: var(--text); color: var(--text); }
    .call-btn.active-verify { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    .call-btn.active-reject { background: rgba(248, 81, 73, 0.1); border-color: var(--red); color: var(--red); }

    /* Notes */
    .notes-section { margin-top: 0.5rem; border-top: 1px solid var(--border); padding-top: 0.5rem; }
    .note-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; font-size: 0.72rem; color: var(--text-muted); }
    .note-text { flex: 1; font-style: italic; }
    .note-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.65rem; }
    .note-delete:hover { color: var(--red); }
    .note-form { display: flex; gap: 0.4rem; margin-top: 0.3rem; }
    .note-input { flex: 1; font-size: 0.72rem; padding: 0.3rem 0.5rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-body); }
    .note-submit { font-family: var(--font-mono); font-size: 0.6rem; padding: 0.3rem 0.6rem; background: var(--green-dim); border: 1px solid var(--green); border-radius: 4px; color: var(--green); cursor: pointer; }

    /* Confirm */
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 300; }
    .confirm-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem 2rem; max-width: 400px; text-align: center; }
    .confirm-msg { font-size: 0.9rem; margin-bottom: 1.25rem; line-height: 1.4; }
    .confirm-actions { display: flex; gap: 0.75rem; justify-content: center; }
    .confirm-actions button { font-family: var(--font-mono); font-size: 0.75rem; padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); }
    .confirm-cancel { background: var(--surface-2); color: var(--text-muted); }
    .confirm-danger { background: rgba(248, 81, 73, 0.15); color: var(--red); border-color: var(--red); }
    .confirm-ok { background: var(--green-dim); color: var(--green); border-color: var(--green); }

    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); border: 1px solid var(--green); color: var(--green); padding: 0.6rem 1.5rem; border-radius: 8px; font-family: var(--font-mono); font-size: 0.78rem; z-index: 200; opacity: 0; transition: transform 0.3s, opacity 0.3s; pointer-events: none; }
    .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

    .loading { text-align: center; color: var(--text-muted); padding: 3rem; font-style: italic; }

    @media (max-width: 900px) {
      .chart-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px) {
      .species-hero { flex-direction: column; align-items: center; text-align: center; }
      .species-hero-img, .species-hero-placeholder { width: 140px; height: 140px; }
      .hourly-bars, .monthly-bars { height: 80px; }
    }
  </style>
  <link rel="stylesheet" href="./demo-overrides.css">
  <script src="./data-router.js"></script>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">🦉</span>
      <span class="logo-text">AviSonar</span>
      <span class="logo-sub" data-i18n="species.profile">Species Profile</span>
    </div>
    <nav class="header-nav">
      <a href="./" class="nav-link" data-i18n="nav.dashboard">Dashboard</a>
      <a href="./calls.html" class="nav-link" data-i18n="nav.calls">Calls</a>
      <a href="./label.html" class="nav-link" data-i18n="nav.label">Label</a>
      <a href="./analytics.html" class="nav-link" data-i18n="nav.analytics">Analytics</a>
      <a href="./map.html" class="nav-link" data-i18n="nav.map">Map</a>
      <a href="./settings.html" class="nav-link" data-i18n="nav.settings">Settings</a>
    </nav>
    <div class="header-stats">
      <div class="status-dot active" id="status-dot"></div>
    </div>
  </header>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <main>
    <a href="./" class="back-link">&larr; <span data-i18n="nav.dashboard">Dashboard</span></a>
    <div id="content"><div class="loading" data-i18n="species.loading">Loading species data...</div></div>
  </main>

  <script src="i18n.js"></script>
  <script src="spectrogram.js"></script>
  <script src="call-actions.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const currentSpecies = params.get('name');
    if (!currentSpecies) { document.getElementById('content').innerHTML = `<div class="loading">${t('species.not_specified')}</div>`; }
    else { loadAll(); }

    function showToast(msg) {
      const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2500);
    }
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtLocale() { return getLang() || 'en'; }
    function formatDate(ts) { return ts ? new Date(ts).toLocaleDateString(fmtLocale(), { day: 'numeric', month: 'short', year: 'numeric' }) : '\u2014'; }
    function formatTime(ts) { return new Date(ts).toLocaleTimeString(fmtLocale(), { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
    function formatTimeShort(ts) { return new Date(ts).toLocaleTimeString(fmtLocale(), { hour: '2-digit', minute: '2-digit' }); }
    function formatDateShort(ts) { return new Date(ts).toLocaleDateString(fmtLocale(), { day: 'numeric', month: 'short' }); }

    let sunData = null;

    async function loadAll() {
      const [detail, hourly, trend, confidence, monthly, _sunData] = await Promise.all([
        fetch(`/api/species/detail?name=${encodeURIComponent(currentSpecies)}`).then(r => r.json()),
        fetch(`/api/analytics/species-activity?name=${encodeURIComponent(currentSpecies)}`).then(r => r.json()),
        fetch(`/api/analytics/species-trend?name=${encodeURIComponent(currentSpecies)}`).then(r => r.json()),
        fetch(`/api/analytics/species-confidence?name=${encodeURIComponent(currentSpecies)}`).then(r => r.json()),
        fetch(`/api/analytics/species-monthly?name=${encodeURIComponent(currentSpecies)}`).then(r => r.json()),
        fetch('/api/sun').then(r => r.json()),
      ]);

      sunData = _sunData;
      if (!detail.summary) { document.getElementById('content').innerHTML = `<div class="loading">${t('species.not_found')}</div>`; return; }

      const s = detail.summary;
      const localName = speciesName(s.common_name, s.scientific_name);
      document.title = `AviSonar \u2014 ${localName}`;

      // Wikipedia image
      let imgHtml = '<div class="species-hero-placeholder">🐦</div>';
      try {
        const wt = s.scientific_name.replaceAll(' ', '_');
        const ac = new AbortController(); const to = setTimeout(() => ac.abort(), 5000);
        const wr = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wt}`, { signal: ac.signal });
        clearTimeout(to);
        if (wr.ok) { const wd = await wr.json(); if (wd?.thumbnail?.source) { const lg = wd.originalimage?.source || wd.thumbnail.source; imgHtml = `<img class="species-hero-img" src="${lg}" alt="${speciesName(s.common_name, s.scientific_name)}">`; } }
      } catch {}

      const verifiedPct = s.total_calls > 0 ? Math.round((s.total_verified || 0) / s.total_calls * 100) : 0;
      const peakHour = s.peak_hour !== null ? `${String(s.peak_hour).padStart(2, '0')}:00` : '\u2014';

      // Fetch IUCN status
      let iucnHtml = '';
      try {
        const iucnRes = await fetch(`/api/conservation/${encodeURIComponent(s.scientific_name)}`);
        const iucnData = await iucnRes.json();
        const st = iucnData.iucn_status || 'NE';
        const colors = { CR: '#cc3333', EN: '#cc6633', VU: '#cccc00', NT: '#669900', LC: '#006600', DD: '#999', NE: '#666' };
        const trendSymbols = { increasing: '\u25B2', stable: '\u25CF', decreasing: '\u25BC', unknown: '?' };
        const trendColors = { increasing: '#3fb950', stable: '#7d8590', decreasing: '#f85149', unknown: '#7d8590' };
        const trend = iucnData.population_trend || 'unknown';
        iucnHtml = `<div class="iucn-hero-badge" style="margin-bottom:1rem;">
          <span style="display:inline-block;background:${colors[st]};color:white;font-family:var(--font-mono);font-size:0.75rem;padding:0.25rem 0.6rem;border-radius:4px;font-weight:500;letter-spacing:0.05em;">${st} — ${t('iucn.' + st)}</span>
          <span style="font-family:var(--font-mono);font-size:0.7rem;color:${trendColors[trend]};margin-left:0.5rem;">${trendSymbols[trend]} ${t('trend.' + trend)}</span>
        </div>`;
      } catch {}

      let html = `
        <div class="species-hero">
          ${imgHtml}
          <div class="species-hero-info">
            <div class="species-hero-common">${localName}</div>
            <div class="species-hero-sci">${s.scientific_name}</div>
            ${iucnHtml}
            <div class="stats-grid">
              <div class="stat-box"><span class="stat-box-value">${s.encounter_count}</span><span class="stat-box-label">${t('species.encounters')}</span></div>
              <div class="stat-box"><span class="stat-box-value">${s.total_calls}</span><span class="stat-box-label">${t('species.total_calls')}</span></div>
              <div class="stat-box"><span class="stat-box-value">${verifiedPct}%</span><span class="stat-box-label">${t('species.verified')}</span></div>
              <div class="stat-box"><span class="stat-box-value">${Math.round((s.avg_confidence || 0) * 100)}%</span><span class="stat-box-label">${t('species.avg_confidence')}</span></div>
              <div class="stat-box"><span class="stat-box-value">${formatDate(s.first_seen)}</span><span class="stat-box-label">${t('species.first_seen')}</span></div>
              <div class="stat-box"><span class="stat-box-value">${formatDate(s.last_seen)}</span><span class="stat-box-label">${t('species.last_seen')}</span></div>
              <div class="stat-box"><span class="stat-box-value">${peakHour}</span><span class="stat-box-label">${t('species.peak_hour')}</span></div>
              <div class="stat-box"><span class="stat-box-value">${s.avg_calls_per_encounter || '\u2014'}</span><span class="stat-box-label">${t('species.calls_per_encounter')}</span></div>
            </div>
          </div>
        </div>

        <!-- Charts row 1: Hourly Activity + Detection Trend -->
        <div class="chart-row">
          <div class="chart-panel">
            <div class="chart-title">${t('species.hourly_activity')}</div>
            <div id="hourly-chart" class="hourly-bars"></div>
          </div>
          <div class="chart-panel">
            <div class="chart-title">${t('species.detection_trend')}</div>
            <div id="trend-chart"></div>
          </div>
        </div>

        <!-- Charts row 2: Confidence Scatter + Monthly -->
        <div class="chart-row">
          <div class="chart-panel">
            <div class="chart-title">${t('species.confidence_over_time')}</div>
            <div id="confidence-chart"></div>
          </div>
          <div class="chart-panel">
            <div class="chart-title">${t('species.monthly_presence')}</div>
            <div id="monthly-chart" class="monthly-bars"></div>
          </div>
        </div>

        <!-- Actions -->
        <div class="actions-row">
          <button class="action-btn" onclick="bulkVerify('${s.common_name}', ${s.unverified_count})">${t('species.verify_all')} (${s.unverified_count})</button>
          <a class="action-btn" href="#" onclick="event.preventDefault(); window.location.href='/api/export/csv'">${t('species.export_csv')}</a>
        </div>

        <!-- Encounters -->
        <div class="section-title">
          ${t('species.encounter_timeline')}
          <select class="sort-select" id="enc-sort" onchange="sortEncounters()">
            <option value="newest">${t('species.sort_newest')}</option>
            <option value="oldest">${t('species.sort_oldest')}</option>
            <option value="confidence">${t('species.sort_confidence')}</option>
            <option value="calls">${t('species.sort_calls')}</option>
          </select>
        </div>
        <div id="encounters-list"></div>
      `;

      document.getElementById('content').innerHTML = html;

      // Render charts
      renderHourlyChart(hourly);
      renderTrendChart(trend);
      renderConfidenceChart(confidence);
      renderMonthlyChart(monthly);
      window._encounters = detail.encounters;
      sortEncounters();
    }

    // --- Hourly Activity ---
    function sunClass(hour, sun) {
      if (!sun) return '';
      if (hour < sun.dawn || hour >= sun.dusk) return 'sun-night';
      if (hour < sun.sunrise || hour >= sun.sunset) return 'sun-twilight';
      return 'sun-day';
    }

    function renderHourlyChart(data) {
      const container = document.getElementById('hourly-chart');
      const hourMap = {}; data.forEach(d => { hourMap[d.hour] = d.count; });
      const maxCount = Math.max(...Object.values(hourMap), 1);
      let html = '';
      for (let h = 0; h < 24; h++) {
        const hs = String(h).padStart(2, '0');
        const count = hourMap[hs] || 0;
        const pct = Math.max(2, (count / maxCount) * 100);
        html += `<div class="hourly-bar-wrap ${sunClass(h, sunData)}" title="${hs}:00 \u2014 ${count} ${t('kpi.calls')}">
          <div class="hourly-bar" style="height:${pct}%"></div>
          <div class="hourly-bar-label" ${h % 3 !== 0 ? 'style="visibility:hidden"' : ''}>${hs}</div>
        </div>`;
      }
      container.innerHTML = html;
    }

    // --- Trend line ---
    function fmtWeek(w) { return 'W' + w.split('-')[1]; }

    function renderTrendChart(data) {
      const container = document.getElementById('trend-chart');
      if (!data.length) { container.innerHTML = `<div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:0.8rem;font-style:italic;">${t('empty.no_data')}</div>`; return; }
      if (data.length === 1) {
        container.innerHTML = `<div style="text-align:center;padding:1.5rem;">
          <div style="font-family:var(--font-display);font-size:2rem;color:var(--green);">${data[0].calls}</div>
          <div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);margin-top:0.3rem;">${t('kpi.calls')} ${fmtWeek(data[0].week)}</div>
          <div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--muted);margin-top:0.5rem;font-style:italic;">${t('species.trend_after_more_weeks')}</div>
        </div>`;
        return;
      }
      const w = 440, h = 140, pad = { top: 10, right: 10, bottom: 28, left: 35 };
      const iw = w - pad.left - pad.right, ih = h - pad.top - pad.bottom;
      const yMaxRaw = Math.max(...data.map(d => d.calls), 1);
      let yTop = Math.ceil(yMaxRaw);
      let ySteps = yTop <= 5 ? yTop : yTop <= 10 ? 5 : 4;
      if (ySteps === 0) ySteps = 1;
      yTop = Math.ceil(yTop / ySteps) * ySteps;
      const xS = i => pad.left + (i / Math.max(data.length - 1, 1)) * iw;
      const yS = v => pad.top + ih - (v / yTop) * ih;
      const pts = data.map((d, i) => `${xS(i)},${yS(d.calls)}`).join(' ');
      const area = `${xS(0)},${pad.top + ih} ${pts} ${xS(data.length - 1)},${pad.top + ih}`;
      let svg = `<svg viewBox="0 0 ${w} ${h}" class="chart-svg">`;
      for (let i = 0; i <= ySteps; i++) { const val = yTop * (ySteps - i) / ySteps; const y = pad.top + (i / ySteps) * ih; svg += `<line x1="${pad.left}" y1="${y}" x2="${w - pad.right}" y2="${y}" stroke="#30363d" stroke-width="0.5"/><text x="${pad.left - 5}" y="${y + 3}" text-anchor="end" font-size="8">${Math.round(val)}</text>`; }
      svg += `<polygon points="${area}" fill="#3fb950" opacity="0.08"/>`;
      svg += `<polyline points="${pts}" fill="none" stroke="#3fb950" stroke-width="2" stroke-linejoin="round"/>`;
      const step = Math.max(1, Math.floor(data.length / 6));
      data.forEach((d, i) => { svg += `<circle cx="${xS(i)}" cy="${yS(d.calls)}" r="2.5" fill="#3fb950"/>`; if (i % step === 0 || i === data.length - 1) { svg += `<text x="${xS(i)}" y="${pad.top + ih + 16}" text-anchor="middle" font-size="8">${fmtWeek(d.week)}</text>`; } });
      svg += '</svg>';
      container.innerHTML = svg;
    }

    // --- Confidence scatter ---
    function renderConfidenceChart(data) {
      const container = document.getElementById('confidence-chart');
      if (!data.length) { container.innerHTML = `<div class="loading" style="padding:1rem">${t('empty.no_data')}</div>`; return; }
      const w = 440, h = 140, pad = { top: 10, right: 10, bottom: 25, left: 35 };
      const iw = w - pad.left - pad.right, ih = h - pad.top - pad.bottom;
      const yMin = 0.6, yMax = 1.0;
      const xS = i => pad.left + (i / Math.max(data.length - 1, 1)) * iw;
      const yS = v => pad.top + ih - ((v - yMin) / (yMax - yMin)) * ih;
      let svg = `<svg viewBox="0 0 ${w} ${h}" class="chart-svg">`;
      // Y axis labels
      for (let v = 0.7; v <= 1.0; v += 0.1) { const y = yS(v); svg += `<line x1="${pad.left}" y1="${y}" x2="${w - pad.right}" y2="${y}" stroke="#30363d" stroke-width="0.5"/><text x="${pad.left - 5}" y="${y + 3}" text-anchor="end" font-size="7">${Math.round(v * 100)}%</text>`; }
      // Check if all data is same day — show time instead of date
      const dates = new Set(data.map(d => d.timestamp.substring(0, 10)));
      const singleDay = dates.size <= 1;
      function xLabel(ts) { return singleDay ? ts.substring(11, 16) : formatDateShort(ts); }

      // Dots
      const step = Math.max(1, Math.floor(data.length / 8));
      data.forEach((d, i) => {
        const color = d.status === 'verified' ? '#3fb950' : d.status === 'rejected' ? '#f85149' : '#7d8590';
        const statusLabel = d.status === 'verified' ? t('action.verify') : d.status === 'rejected' ? t('action.reject') : d.status;
        svg += `<circle cx="${xS(i)}" cy="${yS(d.confidence)}" r="3" fill="${color}" opacity="0.7"><title>${xLabel(d.timestamp)} ${Math.round(d.confidence * 100)}% (${statusLabel})</title></circle>`;
        if (i % step === 0 || i === data.length - 1) { svg += `<text x="${xS(i)}" y="${pad.top + ih + 16}" text-anchor="middle" font-size="8">${xLabel(d.timestamp)}</text>`; }
      });
      svg += '</svg>';
      container.innerHTML = svg;
    }

    // --- Monthly bars ---
    function renderMonthlyChart(data) {
      const container = document.getElementById('monthly-chart');
      const monthKeys = ['month.jan','month.feb','month.mar','month.apr','month.may','month.jun','month.jul','month.aug','month.sep','month.oct','month.nov','month.dec'];
      const monthMap = {}; data.forEach(d => { monthMap[d.month] = d.calls; });
      const maxCalls = Math.max(...Object.values(monthMap), 1);
      let html = '';
      for (let m = 1; m <= 12; m++) {
        const ms = String(m).padStart(2, '0');
        const calls = monthMap[ms] || 0;
        const pct = Math.max(2, (calls / maxCalls) * 100);
        const mLabel = t(monthKeys[m-1]);
        html += `<div class="monthly-bar-wrap" title="${mLabel}: ${calls} ${t('kpi.calls')}">
          ${calls > 0 ? `<div class="monthly-bar-count">${calls}</div>` : ''}
          <div class="monthly-bar" style="height:${calls > 0 ? pct : 2}%;${calls === 0 ? 'background:var(--surface-2)' : ''}"></div>
          <div class="monthly-bar-label">${mLabel}</div>
        </div>`;
      }
      container.innerHTML = html;
    }

    // --- Encounters ---
    function sortEncounters() {
      const sort = document.getElementById('enc-sort').value;
      let encs = [...(window._encounters || [])];
      if (sort === 'oldest') encs.sort((a, b) => a.started_at.localeCompare(b.started_at));
      else if (sort === 'confidence') encs.sort((a, b) => b.max_confidence - a.max_confidence);
      else if (sort === 'calls') encs.sort((a, b) => b.call_count - a.call_count);
      // default: newest first (already sorted from API)
      renderEncounters(encs);
    }

    function renderEncounters(encounters) {
      const container = document.getElementById('encounters-list');
      if (!encounters.length) { container.innerHTML = `<div class="loading">${t('empty.no_encounters')}</div>`; return; }

      container.innerHTML = encounters.map((enc, idx) => {
        const dateStr = formatDateShort(enc.started_at);
        let timeStr = formatTime(enc.started_at);
        if (enc.call_count > 1 && enc.started_at !== enc.ended_at) timeStr = `${formatTimeShort(enc.started_at)} \u2013 ${formatTimeShort(enc.ended_at)}`;
        const conf = Math.round(enc.max_confidence * 100);
        const confClass = conf >= 85 ? 'enc-conf-high' : 'enc-conf-mid';
        const verified = enc.verified_count || 0;
        const statusText = verified > 0 ? `${verified} ${t('species.verified').toLowerCase()}` : '';

        // Compact row
        let html = `<div class="encounter-compact" onclick="toggleEnc(${idx})">
          <span class="enc-date">${dateStr}</span>
          <span class="enc-time">${timeStr}</span>
          <span class="enc-calls">${enc.call_count} ${t('kpi.calls')}</span>
          <span class="enc-conf ${confClass}">${conf}%</span>
          <span class="enc-status">${statusText}</span>
          <span class="enc-expand" id="enc-arrow-${idx}">&#9654;</span>
        </div>`;

        // Detail (hidden)
        html += `<div class="encounter-detail" id="enc-detail-${idx}">`;
        for (const call of enc.calls) {
          const cpct = Math.round(call.confidence * 100);
          const sc = call.status === 'verified' ? 'verified' : call.status === 'rejected' ? 'rejected' : '';
          const va = call.status === 'verified' ? 'active-verify' : '';
          const ra = call.status === 'rejected' ? 'active-reject' : '';
          let audioHtml = `<span class="call-no-audio">${t('species.no_audio')}</span>`;
          if (call.audio_file) {
            const audioSrc = '/audio/' + encodeURIComponent(call.audio_file);
            const compareUrl = `compare.html?file=${encodeURIComponent(call.audio_file)}&species=${encodeURIComponent(enc.scientific_name || '')}&common_name=${encodeURIComponent(currentSpecies)}&call_id=${call.id}`;
            audioHtml = `<div class="call-audio"><audio controls preload="none" src="${audioSrc}"></audio><button class="spect-toggle" onclick="event.stopPropagation(); toggleSpectrogram(this, '${audioSrc}')" title="${t('spectrogram.toggle')}">&#9776;</button><a class="spect-toggle" href="${compareUrl}" title="${t('compare.title')}" style="text-decoration:none;font-size:0.75rem;">&#128269;</a><div class="spect-container" style="display:none;"></div></div>`;
          }
          let badge = '';
          if (call.status === 'verified') badge = `<span class="call-badge badge-verified">${t('action.verify').toLowerCase()}</span>`;
          if (call.status === 'rejected') badge = `<span class="call-badge badge-rejected">${t('action.reject').toLowerCase()}</span>`;

          // YAMNet chips: top bird + top noise (advisory — helps spot urban-noise misses at a glance)
          let yamChips = '';
          if (call.yamnet) {
            const tb = call.yamnet.top_bird;
            const tn = call.yamnet.top_noise;
            if (tb) yamChips += `<span class="yam-chip yam-chip-bird" title="YAMNet bird">${tb.class_name} ${(tb.score*100).toFixed(0)}%</span>`;
            if (tn) yamChips += `<span class="yam-chip yam-chip-noise" title="YAMNet noise">${tn.class_name} ${(tn.score*100).toFixed(0)}%</span>`;
          }

          // Corrected-species note: if the reviewer labelled this call as something else
          let correction = '';
          if (call.corrected_common_name && call.corrected_common_name !== currentSpecies) {
            correction = `<span class="call-correction" title="${t('species.correction_hint') !== 'species.correction_hint' ? t('species.correction_hint') : 'Reviewer label'}">\u270E ${call.corrected_common_name}</span>`;
          }

          html += `<div class="call-row ${sc}" data-call-id="${call.id}">
            <span class="call-time">${formatTime(call.timestamp)}</span>
            <span class="call-conf">${cpct}%</span>
            ${audioHtml} ${yamChips} ${correction} ${badge}
            ${renderCallActions({
              callId: call.id,
              audioFile: call.audio_file,
              commonName: currentSpecies,
              scientificName: enc.scientific_name,
              status: call.status,
              showAnalyze: true,
            })}
          </div>`;
        }
        // Notes
        html += `<div class="notes-section">`;
        if (enc.notes?.length) {
          for (const n of enc.notes) html += `<div class="note-item"><span class="note-text">${escapeHtml(n.text)}</span><button class="note-delete" onclick="event.stopPropagation(); deleteNote(${n.id})">&times;</button></div>`;
        }
        html += `<form class="note-form" onsubmit="event.stopPropagation(); submitNote(event, ${enc.id})"><input class="note-input" type="text" placeholder="${t('species.add_note_placeholder')}" required><button class="note-submit" type="submit">${t('action.add')}</button></form></div>`;
        html += '</div>';
        return html;
      }).join('');
    }

    function toggleEnc(idx) {
      const detail = document.getElementById(`enc-detail-${idx}`);
      const arrow = document.getElementById(`enc-arrow-${idx}`);
      detail.classList.toggle('open');
      arrow.classList.toggle('open');
    }

    // --- Verification ---
    async function setCallStatus(callId, status, btn) {
      const row = btn.closest('.call-row');
      const cur = row.classList.contains('verified') ? 'verified' : row.classList.contains('rejected') ? 'rejected' : 'unverified';
      const newStatus = cur === status ? 'unverified' : status;
      const res = await fetch(`/api/calls/${callId}/verify`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: newStatus }) });
      if (res.ok) { showToast(newStatus === 'unverified' ? t('toast.status_reset') : newStatus === 'verified' ? t('toast.verified') : t('toast.rejected')); setTimeout(() => loadAll(), 300); }
    }

    function confirmReject(callId, btn) {
      const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
      overlay.innerHTML = `<div class="confirm-box"><div class="confirm-msg">${t('confirm.reject')}</div><div class="confirm-actions"><button class="confirm-cancel" onclick="this.closest('.confirm-overlay').remove()">${t('action.cancel')}</button><button class="confirm-danger" id="confirm-yes">${t('action.reject')}</button></div></div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.getElementById('confirm-yes').addEventListener('click', () => { overlay.remove(); setCallStatus(callId, 'rejected', btn); });
    }

    async function bulkVerify(commonName, count) {
      if (count === 0) { showToast(t('toast.nothing_to_verify')); return; }
      const localName = speciesName(commonName, null);
      const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
      overlay.innerHTML = `<div class="confirm-box"><div class="confirm-msg">${t('confirm.verify_all').replace('{0}', count).replace('{1}', localName)}</div><div class="confirm-actions"><button class="confirm-cancel" onclick="this.closest('.confirm-overlay').remove()">${t('action.cancel')}</button><button class="confirm-ok" id="confirm-yes">${t('confirm.verify_all_btn')}</button></div></div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.getElementById('confirm-yes').addEventListener('click', async () => {
        overlay.remove();
        const res = await fetch(`/api/species/${encodeURIComponent(commonName)}/bulk-verify`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'verified' }) });
        if (res.ok) { const d = await res.json(); showToast(`${d.changed} ${t('toast.calls_verified')}`); loadAll(); }
      });
    }

    async function submitNote(event, encounterId) {
      event.preventDefault();
      const form = event.target; const input = form.querySelector('.note-input'); const text = input.value.trim(); if (!text) return;
      const res = await fetch(`/api/encounters/${encounterId}/notes`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
      if (res.ok) { input.value = ''; showToast(t('toast.note_added')); loadAll(); }
    }

    async function deleteNote(noteId) {
      const res = await fetch(`/api/notes/${noteId}`, { method: 'DELETE' });
      if (res.ok) { showToast(t('toast.note_deleted')); loadAll(); }
    }

    // Re-render all dynamic content when language changes
    window.addEventListener('languageChanged', () => {
      if (currentSpecies) loadAll();
    });
  </script>
</body>
</html>
