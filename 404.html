<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Regen Studio Demos</title>
  <meta name="robots" content="noindex">
  <meta name="description" content="The page you're looking for doesn't exist. Return to Regen Studio demos.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Page Not Found | Regen Studio Demos">
  <meta property="og:description" content="The page you're looking for doesn't exist. Return to Regen Studio demos.">
  <meta property="og:url" content="https://demos.regenstudio.world/404.html">
  <meta property="og:image" content="https://www.regenstudio.world/Images/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Page Not Found | Regen Studio Demos">
  <meta name="twitter:description" content="The page you're looking for doesn't exist. Return to Regen Studio demos.">
  <meta name="twitter:image" content="https://www.regenstudio.world/Images/og-image.png">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="stylesheet" href="assets/css/styles.css">

  <style>
    .error-page {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
    }
    .error-page__inner {
      max-width: 480px;
    }
    .error-page__img {
      display: block;
      margin: 0 auto 32px;
      max-width: 320px;
      width: 100%;
      height: auto;
    }
    .error-page__title {
      font-family: var(--font-sans);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    .error-page__text {
      font-size: 1.05rem;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .error-page__actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .error-page__btn {
      display: inline-block;
      background: var(--emerald);
      color: white;
      padding: 10px 28px;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 0.95rem;
      transition: background var(--duration) var(--ease);
      text-decoration: none;
    }
    .error-page__btn:hover {
      background: var(--emerald-hover);
      color: white;
    }
    .error-page__link {
      font-size: 0.95rem;
      color: var(--emerald);
      font-weight: 500;
    }
    .error-page__link:hover {
      text-decoration: underline;
    }
  </style>

  <script>
    // GitHub Pages SPA redirect for client-side routed demos
    // Only redirect if this looks like a demo sub-route (e.g. /dpp-system/dpp/123)
    (function() {
      var l = window.location;
      var pathParts = l.pathname.split('/').filter(Boolean);
      var demoRoutes = ['EDI-wallet', 'dpp-system', 'battery-questionnaire', 'ai-tax-ubi', 'cpr-dpp-tracker'];

      if (pathParts.length >= 2 && demoRoutes.indexOf(pathParts[0]) !== -1) {
        var demoBase = '/' + pathParts[0] + '/';
        var subPath = pathParts.slice(1).join('/');
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          demoBase + '?/' + subPath.replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    })();
  </script>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="https://www.regenstudio.world" class="header-logo">
        <img src="assets/images/logo-color.png" alt="Regen Studio">
      </a>
      <button class="header-toggle" id="headerToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="header-nav">
        <a href="https://www.regenstudio.world/#focus">Our Focus</a>
        <a href="https://www.regenstudio.world/#about">Vision</a>
        <a href="https://www.regenstudio.world/#services">Services</a>
        <a href="https://www.regenstudio.world/blog.html">Blog</a>
        <a href="/" class="header-nav-active">Demos</a>
        <a href="https://www.regenstudio.world/#contact" class="header-nav-cta">Get in Touch</a>
      </nav>
    </div>
  </header>

  <main class="error-page">
    <div class="error-page__inner">
      <img src="assets/images/404-chameleon.png" alt="Curious chameleon on a pencil" class="error-page__img">
      <h1 class="error-page__title">Page not found</h1>
      <p class="error-page__text">The page you're looking for doesn't exist or has been moved.</p>
      <div class="error-page__actions">
        <a href="/" class="error-page__btn">Back to demos</a>
        <a href="https://www.regenstudio.world" class="error-page__link">Visit main site &rarr;</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2026 Regen Studio &middot; <a href="https://www.regenstudio.world/privacy.html">Privacy Policy</a></p>
  </footer>

  <script src="assets/js/tracker.js"></script>
  <script>
    var toggle = document.getElementById('headerToggle');
    var headerNav = document.querySelector('.header-nav');
    if (toggle && headerNav) {
      toggle.addEventListener('click', function() {
        toggle.classList.toggle('active');
        headerNav.classList.toggle('open');
      });
    }
  </script>
</body>
</html>
