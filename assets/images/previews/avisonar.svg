<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#AFF9D7"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Triangle band (varied accent) -->
  <polygon points="0,0 200,0 100,140" fill="#65DD35" fill-opacity="0.8"/>
  <polygon points="200,0 380,0 300,140 100,140" fill="#008545" fill-opacity="0.85"/>
  <polygon points="380,0 600,0 500,140 300,140" fill="#009BBB" fill-opacity="0.8"/>
  <polygon points="0,140 100,140 60,260" fill="#FFA92D" fill-opacity="0.7"/>
  <polygon points="100,140 300,140 200,260 60,260" fill="#65DD35" fill-opacity="0.55"/>
  <polygon points="300,140 500,140 400,260 200,260" fill="#008545" fill-opacity="0.4"/>
  <polygon points="500,140 600,140 600,260 400,260" fill="#009BBB" fill-opacity="0.4"/>
  <polygon points="60,260 200,260 130,340" fill="#65DD35" fill-opacity="0.25"/>
  <polygon points="200,260 400,260 300,340 130,340" fill="#008545" fill-opacity="0.2"/>
  <polygon points="400,260 600,260 600,340 300,340" fill="#009BBB" fill-opacity="0.18"/>

  <!-- Mock spectrogram bars in the bottom 25% -->
  <g transform="translate(40, 320)">
    <rect x="0"  y="0" width="6" height="32" fill="#008545" opacity="0.4"/>
    <rect x="10" y="6" width="6" height="20" fill="#008545" opacity="0.6"/>
    <rect x="20" y="2" width="6" height="28" fill="#008545" opacity="0.7"/>
    <rect x="30" y="10" width="6" height="14" fill="#008545" opacity="0.5"/>
    <rect x="40" y="0" width="6" height="32" fill="#009BBB" opacity="0.7"/>
    <rect x="50" y="4" width="6" height="24" fill="#009BBB" opacity="0.65"/>
    <rect x="60" y="0" width="6" height="32" fill="#009BBB" opacity="0.8"/>
    <rect x="70" y="8" width="6" height="18" fill="#65DD35" opacity="0.55"/>
    <rect x="80" y="3" width="6" height="26" fill="#65DD35" opacity="0.7"/>
    <rect x="90" y="0" width="6" height="32" fill="#65DD35" opacity="0.85"/>
    <rect x="100" y="6" width="6" height="20" fill="#FFA92D" opacity="0.7"/>
    <rect x="110" y="2" width="6" height="28" fill="#FFA92D" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(300, 200)" text-anchor="middle">
    <text font-family="Playfair Display, Georgia, serif" font-size="48" font-weight="900" fill="#1B2833">AviSonar</text>
    <text y="34" font-family="Inter, sans-serif" font-size="13" letter-spacing="3" font-weight="500" fill="#243644">PASSIVE ACOUSTIC MONITORING</text>
  </g>
</svg>
