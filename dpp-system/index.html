    <script>window.DEMO_GUARD = { demoId: 'dpp-system' };</script>
    <script src="../assets/js/guard.js"></script>
    <script>
      // localStorage polyfill — provides in-memory fallback when browser
      // blocks storage access (Safari ITP, privacy extensions, restricted iframe)
      // Must load AFTER guard.js so the guard's try-catch sees the real
      // SecurityError and allows access, but BEFORE the React module executes.
      (function(){
        try { var t = localStorage; t.setItem('__test__','1'); t.removeItem('__test__'); }
        catch(e){
          var store = {};
          Object.defineProperty(window, 'localStorage', { value: {
            getItem: function(k){ return store.hasOwnProperty(k) ? store[k] : null; },
            setItem: function(k,v){ store[k] = String(v); },
            removeItem: function(k){ delete store[k]; },
            clear: function(){ store = {}; },
            get length(){ return Object.keys(store).length; },
            key: function(i){ return Object.keys(store)[i] || null; }
          }, configurable: true });
        }
      })();
    </script>
    <div id="root"></div>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(){
        var redirect = window.location.search.match(/^\?\/(.*)/);
        if (redirect) {
          var decoded = redirect[1].replace(/~and~/g, '&');
          var path = decoded.split('&');
          window.history.replaceState(null, null,
            '/dpp-system/' + path[0] +
            (path.length > 1 ? '?' + path.slice(1).join('&') : '') +
            window.location.hash
          );
        }
      })();
    </script>
